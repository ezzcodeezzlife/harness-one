<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fractal Harness</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#30363d;
    --txt:#e6edf3; --dim:#8b949e; --accent:#58a6ff;
    --pending:#6e7681; --planning:#58a6ff; --running:#e3b341; --waiting:#bc8cff;
    --synth:#39c5cf; --done:#3fb950; --failed:#f85149; --skipped:#484f58;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:13px; }
  body { display:flex; flex-direction:column; height:100vh; }

  header { display:flex; gap:10px; align-items:flex-start; padding:10px 14px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header textarea { flex:1; min-width:280px; height:46px; resize:vertical;
    background:var(--bg); color:var(--txt); border:1px solid var(--line);
    border-radius:6px; padding:8px; font-family:inherit; font-size:13px; }
  .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .controls label { color:var(--dim); font-size:11px; display:flex; flex-direction:column; gap:2px; }
  select,input[type=number] { background:var(--bg); color:var(--txt);
    border:1px solid var(--line); border-radius:5px; padding:4px 6px; font-family:inherit; }
  input[type=number]{ width:58px; }
  button { background:var(--accent); color:#06101f; border:0; border-radius:6px;
    padding:9px 16px; font-weight:700; cursor:pointer; font-family:inherit; }
  button:disabled { opacity:.5; cursor:not-allowed; }

  #status { display:flex; gap:14px; align-items:center; padding:5px 14px;
    background:var(--panel2); border-bottom:1px solid var(--line);
    color:var(--dim); font-size:12px; flex-wrap:wrap; }
  #status b { color:var(--txt); font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; }
  .up { background:var(--done); } .down { background:var(--failed); }

  main { flex:1; display:flex; min-height:0; }
  #tree-wrap { flex:1; overflow:auto; position:relative; background:
    radial-gradient(circle at 1px 1px, #1b2230 1px, transparent 0) 0 0/22px 22px; }
  #detail { width:380px; border-left:1px solid var(--line); background:var(--panel);
    overflow:auto; padding:14px; }
  #detail h2 { margin:0 0 4px; font-size:15px; }
  #detail .meta { color:var(--dim); margin-bottom:10px; }
  #detail section { margin-bottom:14px; }
  #detail h3 { margin:0 0 5px; font-size:11px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--accent); }
  #detail pre { white-space:pre-wrap; word-break:break-word; background:var(--bg);
    border:1px solid var(--line); border-radius:6px; padding:10px; margin:0; max-height:42vh; overflow:auto; }
  .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px;
    font-weight:700; color:#06101f; }

  #log { height:150px; border-top:1px solid var(--line); background:var(--panel);
    overflow:auto; padding:8px 12px; font-size:12px; }
  #log div { padding:1px 0; color:var(--dim); }
  #log .t { color:var(--accent); }

  .legend { display:flex; gap:12px; align-items:center; margin-left:auto; }
  .legend span { display:flex; align-items:center; gap:4px; color:var(--dim); font-size:11px; }

  /* SVG node states */
  .node rect { stroke:var(--line); stroke-width:1.5; transition:fill .2s; cursor:pointer; }
  .node text { fill:var(--txt); pointer-events:none; }
  .node .sub { fill:var(--dim); font-size:10px; }
  .node.selected rect { stroke:var(--accent); stroke-width:2.5; }
  .edge { stroke:var(--line); stroke-width:1.5; fill:none; }
  .edge.dep { stroke:var(--waiting); stroke-dasharray:4 3; opacity:.7; }
  .pulse rect { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.6);} }
</style>
</head>
<body>
  <header>
    <textarea id="task" placeholder="Describe a big task to decompose…">Write a comprehensive getting-started guide for a fictional CLI tool called "fractl" that manages cloud deployments: cover installation, configuration, core commands, and troubleshooting.</textarea>
    <div class="controls">
      <label>model<select id="model"></select></label>
      <label>max depth<input type="number" id="depth" value="3" min="1" max="6"></label>
      <label>max subtasks<input type="number" id="subs" value="6" min="2" max="10"></label>
      <label>parallel LLM<input type="number" id="conc" value="2" min="1" max="6"></label>
      <button id="run">Run ▶</button>
    </div>
  </header>

  <div id="status">
    <span><span id="oll-dot" class="dot down"></span><span id="oll-txt">checking…</span></span>
    <span>run: <b id="runid">—</b></span>
    <span>nodes: <b id="ncount">0</b></span>
    <span>tokens: <b id="tok">0</b></span>
    <span>state: <b id="rstate">idle</b></span>
    <div class="legend" id="legend"></div>
  </div>

  <main>
    <div id="tree-wrap"><svg id="svg" width="100%" height="100%"></svg></div>
    <div id="detail"><p class="meta">Select a node to inspect it.</p></div>
  </main>

  <div id="log"></div>

<script>
const ST_COLORS = {pending:'--pending',planning:'--planning',running:'--running',
  waiting:'--waiting',synthesizing:'--synth',done:'--done',failed:'--failed',skipped:'--skipped'};
const ACTIVE = new Set(['planning','running','waiting','synthesizing']);
const cssvar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

let nodes = {}, rootId = null, selected = null, tokens = 0;

// ---- legend ----
const legend = document.getElementById('legend');
for (const [k,v] of Object.entries(ST_COLORS)) {
  const s=document.createElement('span');
  s.innerHTML=`<span class="dot" style="background:${cssvar(v)}"></span>${k}`;
  legend.appendChild(s);
}

// ---- health / models ----
async function health(){
  try{
    const h = await (await fetch('/api/health')).json();
    document.getElementById('oll-dot').className = 'dot '+(h.ollama?'up':'down');
    document.getElementById('oll-txt').textContent = h.ollama? 'ollama up':'ollama down';
    const sel=document.getElementById('model'); sel.innerHTML='';
    (h.models||[]).forEach(m=>{const o=document.createElement('option');o.value=o.textContent=m;
      if(m===h.default_model)o.selected=true; sel.appendChild(o);});
    if(!(h.models||[]).length){const o=document.createElement('option');o.textContent='(no models)';sel.appendChild(o);}
  }catch(e){ document.getElementById('oll-txt').textContent='server unreachable'; }
}

// ---- run ----
document.getElementById('run').onclick = async () => {
  const task=document.getElementById('task').value.trim(); if(!task)return;
  nodes={};rootId=null;selected=null; render(); document.getElementById('detail').innerHTML='<p class="meta">running…</p>';
  const body={task,model:document.getElementById('model').value,
    max_depth:+document.getElementById('depth').value,
    max_subtasks:+document.getElementById('subs').value,
    concurrency:+document.getElementById('conc').value};
  const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  if(j.error){ logline('ERROR: '+j.error); }
};

// ---- SSE ----
function connect(){
  const es=new EventSource('/api/events');
  es.onmessage = ev => {
    const e=JSON.parse(ev.data);
    if(e.type==='snapshot'){ ingestState(e.state); }
    else if(e.type==='run_started'){ nodes={};rootId=null;selected=null;tokens=0;
      document.getElementById('runid').textContent=e.run_id;
      document.getElementById('rstate').textContent='running'; render(); logline('▶ run '+e.run_id+' · '+e.model); }
    else if(e.type==='node'){ nodes[e.node.id]=e.node; if(e.node.parent_id===null)rootId=e.node.id;
      updateStatusBar(); render(); if(selected===e.node.id) showDetail(e.node.id); }
    else if(e.type==='log'){ logline(e.msg, e.node); }
    else if(e.type==='llm_end'){ if(e.totals){tokens=e.totals.prompt+e.totals.eval;
      document.getElementById('tok').textContent=tokens.toLocaleString();} }
    else if(e.type==='run_done'){ document.getElementById('rstate').textContent=e.status;
      logline('■ run '+e.status); }
  };
  es.onerror = ()=>{ /* browser auto-reconnects */ };
}
function ingestState(s){ nodes=s.nodes||{}; rootId=s.root_id;
  if(s.run_id)document.getElementById('runid').textContent=s.run_id;
  if(s.running!==undefined)document.getElementById('rstate').textContent=s.running?'running':'idle';
  if(s.tokens){tokens=s.tokens.prompt+s.tokens.eval;document.getElementById('tok').textContent=tokens.toLocaleString();}
  updateStatusBar(); render();
}
function updateStatusBar(){ document.getElementById('ncount').textContent=Object.keys(nodes).length; }

// ---- log ----
function logline(msg,node){
  const d=document.getElementById('log'); const el=document.createElement('div');
  const t=new Date().toLocaleTimeString();
  el.innerHTML=`<span class="t">${t}</span> ${node?('['+ (nodes[node]?nodes[node].title:node) +'] '):''}${escapeHtml(msg)}`;
  d.appendChild(el); d.scrollTop=d.scrollHeight;
}

// ---- tree layout + render ----
const NW=158, NH=48, XGAP=28, YGAP=92, MARGIN=40;
function layout(){
  const pos={}; let cursor=0;
  function walk(id,depth){
    const n=nodes[id]; if(!n)return;
    const kids=(n.children||[]).filter(c=>nodes[c]);
    if(kids.length===0){ pos[id]={x:cursor*(NW+XGAP), depth}; cursor++; }
    else { kids.forEach(c=>walk(c,depth+1));
      const xs=kids.map(c=>pos[c].x); pos[id]={x:(Math.min(...xs)+Math.max(...xs))/2, depth}; }
  }
  if(rootId&&nodes[rootId]) walk(rootId,0);
  return pos;
}
function render(){
  const svg=document.getElementById('svg');
  if(!rootId||!nodes[rootId]){ svg.innerHTML=''; return; }
  const pos=layout();
  let maxX=0,maxD=0;
  for(const p of Object.values(pos)){ maxX=Math.max(maxX,p.x); maxD=Math.max(maxD,p.depth); }
  const W=maxX+NW+MARGIN*2, H=(maxD+1)*YGAP+MARGIN*2;
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  const X=id=>pos[id].x+MARGIN, Y=id=>pos[id].depth*YGAP+MARGIN;
  let edges='', deps='', rects='';
  for(const id in pos){
    const n=nodes[id];
    // parent-child edges
    (n.children||[]).filter(c=>pos[c]).forEach(c=>{
      const x1=X(id)+NW/2, y1=Y(id)+NH, x2=X(c)+NW/2, y2=Y(c);
      const my=(y1+y2)/2;
      edges+=`<path class="edge" d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"/>`;
    });
    // dependency edges (sibling -> sibling)
    (n.deps||[]).forEach(d=>{ if(pos[d]){
      const x1=X(d)+NW/2,y1=Y(d)+NH, x2=X(id)+NW/2,y2=Y(id);
      deps+=`<path class="edge dep" d="M${x1},${y1} C${x1},${(y1+y2)/2} ${x2},${(y1+y2)/2} ${x2},${y2}"/>`;
    }});
  }
  for(const id in pos){
    const n=nodes[id]; const col=cssvar(ST_COLORS[n.status]||'--pending');
    const active=ACTIVE.has(n.status)?' pulse':''; const sel=(id===selected)?' selected':'';
    const title=escapeHtml((n.title||'').slice(0,22));
    const kind=n.kind||'?';
    rects+=`<g class="node${active}${sel}" transform="translate(${X(id)},${Y(id)})" onclick="select('${id}')">
      <rect width="${NW}" height="${NH}" rx="8" fill="${col}22" style="stroke:${col}"></rect>
      <rect width="5" height="${NH}" rx="2" fill="${col}"></rect>
      <text x="14" y="19" font-size="12" font-weight="700">${title}</text>
      <text class="sub" x="14" y="35">${kind} · ${n.status}</text>
    </g>`;
  }
  svg.innerHTML=deps+edges+rects;
}
function select(id){ selected=id; render(); showDetail(id); }
async function showDetail(id){
  const n=nodes[id]; if(!n)return;
  const col=cssvar(ST_COLORS[n.status]||'--pending');
  const dur=(n.started_at&&n.ended_at)?((n.ended_at-n.started_at).toFixed(1)+'s'):'—';
  const d=document.getElementById('detail');
  d.innerHTML=`
    <h2>${escapeHtml(n.title)}</h2>
    <p class="meta">
      <span class="pill" style="background:${col}">${n.status}</span>
      &nbsp;${n.kind||'?'} · depth ${n.depth} · ${dur}
      · tok ${(n.tokens?(n.tokens.prompt+n.tokens.eval):0)}
    </p>
    ${n.reasoning?`<section><h3>planner reasoning</h3><pre>${escapeHtml(n.reasoning)}</pre></section>`:''}
    <section><h3>task</h3><pre>${escapeHtml(n.task||'')}</pre></section>
    ${n.error?`<section><h3>error</h3><pre>${escapeHtml(n.error)}</pre></section>`:''}
    ${n.summary?`<section><h3>summary (bubbles up)</h3><pre>${escapeHtml(n.summary)}</pre></section>`:''}
    <section><h3>full output (artifact)</h3><pre id="artifact">loading…</pre></section>`;
  const a=document.getElementById('artifact');
  if(n.artifact){ try{ a.textContent=await (await fetch('/api/artifact?node='+id)).text(); }
    catch{ a.textContent='(unavailable)'; } }
  else a.textContent='(not produced yet)';
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

health(); connect();
setInterval(health, 8000);
</script>
</body>
</html>
